AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Kss Serverless Sample Dev

Parameters:
  BucketName:
    Type: String
  Auth0Domain:
    Type: String
  Auth0ClientID:
    Type: String

Globals:
  Api:
    TracingEnabled: true
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'*'"
      AllowOrigin: "'*'"
  Function:
    Architectures:
      - x86_64
    Environment:
      Variables:
        BUCKET_NAME: !Ref BucketName
        AUTH0_DOMAIN: !Ref Auth0Domain
        AUTH0_CLIENT_ID: !Ref Auth0ClientID
        TZ: "Asia/Tokyo"
    LoggingConfig:
      LogFormat: JSON
    Runtime: python3.13
    Timeout: 30
    Tracing: Active
    VpcConfig:
      SecurityGroupIds:
        - sg-0f7381f06b1b2e8e9 # LambdaからRDS(MySQL)へのアクセスを許可するセキュリティグループID
        - sg-0eeb61b9dd37eadb7 # LambdaからS3へのアクセスを許可するセキュリティグループID
      SubnetIds:
        - subnet-02dc42a62443c03d4 # subnet-private1-ap-northeast-1a
        - subnet-0be77056ce2ab012c # subnet-public1-ap-northeast-1a

Resources:
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: kss-common-layer
      ContentUri: src/layers/common/
      CompatibleRuntimes:
        - python3.13
    CompatibleArchitectures:
      - x86_64

  KssServerlessSampleApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Name: kss-serverless-sample-api

  KssServerlessSampleInitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: KssServerlessSampleInitFunction
      Description: "布施：CI/CD・サーバーレスアプリケーション試作（初期表示）"
      CodeUri: src/functions/init/
      Handler: app.lambda_handler
      Layers:
        - !Ref CommonLayer
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref KssServerlessSampleApi
            Path: /api/init
            Method: get
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
        - AmazonS3FullAccess