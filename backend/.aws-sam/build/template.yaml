AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Kss Serverless Sample Dev
Parameters:
  BucketName:
    Type: String
  Auth0Domain:
    Type: String
  Auth0ClientID:
    Type: String
Globals:
  Api:
    TracingEnabled: true
    Cors:
      AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
      AllowHeaders: '''*'''
      AllowOrigin: '''*'''
  Function:
    Architectures:
    - x86_64
    Environment:
      Variables:
        BUCKET_NAME:
          Ref: BucketName
        AUTH0_DOMAIN:
          Ref: Auth0Domain
        AUTH0_CLIENT_ID:
          Ref: Auth0ClientID
        TZ: Asia/Tokyo
    LoggingConfig:
      LogFormat: JSON
    Runtime: python3.13
    Timeout: 30
    Tracing: Active
    VpcConfig:
      SecurityGroupIds:
      - sg-09411edf7e8f09da5
      - sg-0a22181b7f763ba0c
      SubnetIds:
      - subnet-0dfda9e501f225ea8
      - subnet-0b9b4518dd9d624c8
      - subnet-07756bafd5f6a3716
Resources:
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: kss-common-layer
      ContentUri: ..\..\src\layers\common
      CompatibleRuntimes:
      - python3.13
    CompatibleArchitectures:
    - x86_64
  KssServerlessSampleApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Name: kss-serverless-sample-api
  KssServerlessSampleInitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: KssServerlessSampleInitFunction
      Description: "\u5E03\u65BD\uFF1ACI/CD\u30FB\u30B5\u30FC\u30D0\u30FC\u30EC\u30B9\
        \u30A2\u30D7\u30EA\u30B1\u30FC\u30B7\u30E7\u30F3\u8A66\u4F5C\uFF08\u521D\u671F\
        \u8868\u793A\uFF09"
      CodeUri: KssServerlessSampleInitFunction
      Handler: app.lambda_handler
      Layers:
      - Ref: CommonLayer
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: KssServerlessSampleApi
            Path: /api/init
            Method: get
      Policies:
      - AWSLambdaBasicExecutionRole
      - AWSLambdaVPCAccessExecutionRole
      - AmazonS3FullAccess
    Metadata:
      SamResourceId: KssServerlessSampleInitFunction
